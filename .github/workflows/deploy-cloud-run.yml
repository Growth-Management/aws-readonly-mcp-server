name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/deploy-triggers/cloud-run.txt"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
      CLOUD_RUN_ALLOW_UNAUTHENTICATED: ${{ vars.CLOUD_RUN_ALLOW_UNAUTHENTICATED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required deploy settings
        run: |
          test -n "${{ secrets.GCP_PROJECT_ID }}"
          test -n "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          test -n "${{ secrets.GCP_SERVICE_ACCOUNT }}"
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          test -n "${{ secrets.AWS_ROLE_ARN }}"
          test -n "${{ secrets.AWS_REGION }}"
          test -n "${{ secrets.MCP_AUTH_TOKEN }}"
          test -n "$GCP_REGION"
          test -n "$CLOUD_RUN_SERVICE_NAME"
          test -n "$ARTIFACT_REGISTRY_REPOSITORY"
          test -n "${{ vars.APP_ENV }}"
          test -n "${{ vars.LOG_LEVEL }}"
          test -n "${{ vars.DEFAULT_LOOKBACK_MONTHS }}"
          test -n "${{ vars.ENABLED_SERVICES }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Confirm Artifact Registry repository
        run: |
          gcloud artifacts repositories describe "$ARTIFACT_REGISTRY_REPOSITORY" \
            --location "$GCP_REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(name)'

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build image URI
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REGISTRY_REPOSITORY}/${CLOUD_RUN_SERVICE_NAME}:${{ github.sha }}"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Build image
        run: |
          docker build -t "$IMAGE_URI" .

      - name: Push image
        run: |
          docker push "$IMAGE_URI"

      - name: Deploy to Cloud Run
        run: |
          DEPLOY_ARGS="--image $IMAGE_URI --region ${GCP_REGION} --project ${{ secrets.GCP_PROJECT_ID }} --platform managed"
          DEPLOY_ARGS="$DEPLOY_ARGS --set-env-vars ^@^APP_ENV=${{ vars.APP_ENV }}@LOG_LEVEL=${{ vars.LOG_LEVEL }}@DEFAULT_LOOKBACK_MONTHS=${{ vars.DEFAULT_LOOKBACK_MONTHS }}@ENABLED_SERVICES=${{ vars.ENABLED_SERVICES }}@AWS_REGION=${{ secrets.AWS_REGION }}@AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}@AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}@AWS_ROLE_ARN=${{ secrets.AWS_ROLE_ARN }}@AWS_EXTERNAL_ID=${{ secrets.AWS_EXTERNAL_ID }}@AWS_ROLE_SESSION_NAME=aws-readonly-mcp@MCP_AUTH_TOKEN=${{ secrets.MCP_AUTH_TOKEN }}"
          if [ "$CLOUD_RUN_ALLOW_UNAUTHENTICATED" = "true" ]; then
            DEPLOY_ARGS="$DEPLOY_ARGS --allow-unauthenticated"
          fi
          gcloud run deploy "$CLOUD_RUN_SERVICE_NAME" $DEPLOY_ARGS

      - name: Show deployed service URL
        run: |
          SERVICE_URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE_NAME" \
            --region "$GCP_REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)')"
          echo "$SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_ENV"

      - name: Verify public health endpoint
        if: env.CLOUD_RUN_ALLOW_UNAUTHENTICATED == 'true'
        run: |
          curl --fail --show-error --silent "$SERVICE_URL/health"

      - name: Authenticate for private health check
        if: env.CLOUD_RUN_ALLOW_UNAUTHENTICATED != 'true'
        id: health-auth
        uses: google-github-actions/auth@v2
        with:
          token_format: id_token
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          id_token_audience: ${{ env.SERVICE_URL }}
          id_token_include_email: true

      - name: Verify private health endpoint
        if: env.CLOUD_RUN_ALLOW_UNAUTHENTICATED != 'true'
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ steps.health-auth.outputs.id_token }}" \
            "$SERVICE_URL/health"
